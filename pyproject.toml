# pyproject.toml ─ EmbedSLR
# ============================================
#  • układ „one real package + 5 sub‑packages”
#  • gotowe do publikacji w PyPI / SoftwareX
# ============================================

[project]
name            = "embedslr"
version         = "0.1.0"
description     = "Embedding‑based screening & bibliometrics for systematic literature reviews"
readme          = "README.md"
authors         = [{ name = "Twoje Nazwisko", email = "you@uni.edu" }]
license         = "MIT"
requires-python = ">=3.9"

dependencies = [
    "pandas>=2.1",
    "numpy>=1.25",
    "scikit-learn>=1.3",
    "sentence-transformers>=2.5",
    "typer>=0.9",
    "requests>=2.31",
    "openai>=1.0",
    "cohere>=5.0",
    "nomic>=3.0",
    "jina-hubble-sdk>=0.23"
]

[project.scripts]
embedslr = "embedslr.cli:_entry_point"

# ---------------------------------------------------------------------------
# backend budowania
[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

# ---------------------------------------------------------------------------
# ustawienia setuptools – jawnie wskazujemy, które pakiety wchodzą do wheel‑a
[tool.setuptools.packages.find]
include = [
    "embedslr*",   # główny pakiet + ewentualne podpakiety
    "embeddings",
    "ranking",
    "biblio",
    "utils",
    "io"           # pozostaw tylko jeśli NIE zmieniasz nazwy folderu
]
# Jeśli dodasz katalog testów / notebooków, możesz go wykluczyć:
# exclude = ["tests*", "examples*", "docs*"]
