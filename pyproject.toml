# pyproject.toml ─ konfiguracja pakietu „flat‑layout”

[project]
name            = "embedslr"
version         = "0.1.0"
description     = "Embedding‑based screening & bibliometrics for SLR"
readme          = "README.md"                  # (opcjonalnie, ale zalecane)
authors         = [{ name = "Twoje Nazwisko", email = "you@uni.edu" }]
license         = { text = "MIT" }
requires-python = ">=3.9"

dependencies = [
    "pandas>=2.1",
    "numpy>=1.25",
    "scikit-learn>=1.3",
    "sentence-transformers>=2.5",
    "typer[all]>=0.9",
    "requests>=2.31",
    "openai>=1.0",
    "cohere>=5.0",
    "nomic>=3.0",
    "jina-hubble-sdk>=0.23"
]

[project.scripts]
embedslr = "embedslr.cli:_entry_point"

# ─────────────────────────────────────────────────────────────────────────────
# backend budowania
[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

# ─────────────────────────────────────────────────────────────────────────────
# ustawienia setuptools – ręczne wskazanie pakietów w układzie „flat”
[tool.setuptools]
packages = { find = {} }

[tool.setuptools.packages.find]
include = [
    "embedslr",   # główny pakiet (zawiera __init__.py i cli.py)
    "io",         # uwaga: nazwa koliduje z stdlib io – patrz wskazówki niżej
    "embeddings",
    "ranking",
    "biblio",
    "utils"
]
# opcjonalnie możesz wykluczyć katalogi testów/notebooków:
# exclude = ["tests*", "examples*", "docs*"]
