[project]
name            = "embedslr"
version         = "0.1.0"
description     = "Embedding‑based screening & bibliometrics for systematic literature reviews"
readme          = "README.md"
authors         = [{ name = "Autor", email = "you@example.com" }]
license         = { text = "MIT" }
requires-python = ">=3.9"

dependencies = [
    "pandas>=2.1",
    "numpy>=1.25",
    "scikit-learn>=1.3",
    "sentence-transformers>=2.5",
    "typer>=0.9",
    "rich>=13.7",
    "openai>=0.27",        #  działa również z ≥ 1.0
    "tiktoken>=0.6",
    "tenacity>=8.2",
]

[project.optional-dependencies]
dev = ["pytest", "ruff", "black"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
include = [
    "embedslr*",
    "embeddings",
    "utils",
    "ranking",
    "biblio",
    "io",
]
exclude = ["tests*"]

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"
